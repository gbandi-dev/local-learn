name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
        env:
          VITE_REEARTH_API_TOKEN: ${{ secrets.VITE_REEARTH_API_TOKEN }}
          VITE_REEARTH_WORKSPACE_ID: ${{ secrets.VITE_REEARTH_WORKSPACE_ID }}
          VITE_REEARTH_PROJECT_ID: ${{ secrets.VITE_REEARTH_PROJECT_ID }}
          VITE_REEARTH_SPOTS_MODEL_ID: ${{ secrets.VITE_REEARTH_SPOTS_MODEL_ID }}
          VITE_REEARTH_MENTORS_MODEL_ID: ${{ secrets.VITE_REEARTH_MENTORS_MODEL_ID }}
          VITE_REEARTH_LOGS_MODEL_ID: ${{ secrets.VITE_REEARTH_LOGS_MODEL_ID }}
          VITE_REEARTH_COMMENTS_MODEL_ID: ${{ secrets.VITE_REEARTH_COMMENTS_MODEL_ID }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
